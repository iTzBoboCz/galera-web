name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup node env
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build
        run: npm run build
